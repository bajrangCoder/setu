name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux prerequisites
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libfontconfig-dev libxkbcommon-x11-dev libwayland-dev libx11-xcb-dev libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo check --all-targets --features gpui/runtime_shaders
      - run: cargo clippy --all-targets --features gpui/runtime_shaders -- -D warnings
      - run: cargo test --all-targets --features gpui/runtime_shaders
      - run: cargo build --release --features gpui/runtime_shaders
